<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ThreadSync</title>
    <meta name="description" content="Reset your ThreadSync account password.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Orbitron', 'sans-serif'],
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        gold: { DEFAULT: 'hsl(38, 75%, 55%)', light: 'hsl(40, 65%, 70%)' },
                        navy: { DEFAULT: 'hsl(220, 40%, 20%)', light: 'hsl(220, 30%, 35%)' },
                        cream: { DEFAULT: 'hsl(40, 30%, 97%)', dark: 'hsl(40, 25%, 92%)' },
                        charcoal: 'hsl(220, 15%, 30%)',
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <a href="index.html" class="auth-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="6" cy="6" r="3"/>
                    <path d="m6 9 6 6 6-6"/>
                    <circle cx="18" cy="18" r="3"/>
                </svg>
                <span>ThreadSync</span>
            </a>

            <div class="card">
                <div class="card-header">
                    <h2>Forgot Password?</h2>
                    <p>Enter your email and we'll send you a reset link</p>
                </div>

                <form id="forgot-password-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                    </div>

                    <button type="submit" class="btn btn-gold" style="width: 100%; margin-top: 1rem;">Send Reset Link</button>
                </form>

                <div class="auth-footer">
                    <p>Remember your password? <a href="login.html">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="js/main.js"></script>
</body>
</html>
