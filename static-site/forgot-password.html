<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ThreadSync</title>
    <meta name="description" content="Reset your ThreadSync account password.">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <a href="index.html" class="auth-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="6" cy="6" r="3"/>
                    <path d="m6 9 6 6 6-6"/>
                    <circle cx="18" cy="18" r="3"/>
                </svg>
                <span>ThreadSync</span>
            </a>

            <div class="card">
                <div class="card-header">
                    <h2>Forgot Password?</h2>
                    <p>Enter your email and we'll send you a reset link</p>
                </div>

                <form id="forgot-password-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                    </div>

                    <button type="submit" class="btn btn-gold" style="width: 100%; margin-top: 1rem;">Send Reset Link</button>
                </form>

                <div class="auth-footer">
                    <p>Remember your password? <a href="login.html">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="js/main.js"></script>
</body>
</html>
