<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ThreadSync</title>
    <meta name="description" content="Sign in to your ThreadSync account to manage your orders and appointments.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Orbitron', 'sans-serif'],
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        background: 'hsl(40, 30%, 97%)',
                        foreground: 'hsl(220, 30%, 15%)',
                        card: { DEFAULT: 'hsl(0, 0%, 100%)', foreground: 'hsl(220, 30%, 15%)' },
                        popover: { DEFAULT: 'hsl(0, 0%, 100%)', foreground: 'hsl(220, 30%, 15%)' },
                        primary: { DEFAULT: 'hsl(220, 40%, 20%)', foreground: 'hsl(40, 30%, 97%)' },
                        secondary: { DEFAULT: 'hsl(40, 25%, 92%)', foreground: 'hsl(220, 30%, 15%)' },
                        muted: { DEFAULT: 'hsl(40, 20%, 94%)', foreground: 'hsl(220, 15%, 45%)' },
                        accent: { DEFAULT: 'hsl(38, 75%, 55%)', foreground: 'hsl(220, 40%, 15%)' },
                        destructive: { DEFAULT: 'hsl(0, 84%, 60%)', foreground: 'hsl(0, 0%, 100%)' },
                        border: 'hsl(40, 20%, 88%)',
                        input: 'hsl(40, 20%, 88%)',
                        ring: 'hsl(220, 40%, 20%)',
                        gold: { DEFAULT: 'hsl(38, 75%, 55%)', light: 'hsl(40, 65%, 70%)' },
                        navy: { DEFAULT: 'hsl(220, 40%, 20%)', light: 'hsl(220, 30%, 35%)' },
                        cream: { DEFAULT: 'hsl(40, 30%, 97%)', dark: 'hsl(40, 25%, 92%)' },
                        charcoal: 'hsl(220, 15%, 30%)',
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <!-- Logo -->
            <div class="auth-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="6" cy="6" r="3"/>
                    <path d="M8.12 8.12 12 12"/>
                    <path d="M20 4 8.12 15.88"/>
                    <circle cx="6" cy="18" r="3"/>
                    <path d="M14.8 14.8 18 18"/>
                </svg>
                <span>ThreadSync</span>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your account to continue</p>
                </div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
                            <label for="password" style="margin-bottom: 0;">Password</label>
                            <a href="forgot-password.html" style="font-size: 0.875rem; color: hsl(var(--gold)); font-weight: 500;">Forgot password?</a>
                        </div>
                        <div class="relative">
                            <input type="password" id="password" class="form-input" placeholder="••••••••" required style="padding-right: 2.5rem;">
                            <button type="button" class="password-toggle">
                                <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="eye-off-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                                    <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                                    <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                                    <line x1="2" x2="22" y1="2" y2="22"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-gold btn-lg w-full" style="margin-top: 1.5rem;">Sign In</button>
                </form>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="signup.html">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="js/main.js"></script>
</body>
</html>
